name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: go test -race ./...
      - run: go vet ./...
      - run: bash -n cproxy.sh scripts/install.sh scripts/package-release.sh
      - run: |
          if ls tests/*.sh >/dev/null 2>&1; then
            bash -n tests/*.sh
          fi
